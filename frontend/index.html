<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChurnSense — Customer Retention AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #141c2e;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --glow: 0 0 30px rgba(0,212,255,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content:'';
    position:fixed;
    top:-50%;left:-50%;width:200%;height:200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.06) 0%, transparent 50%);
    animation: bgPulse 8s ease-in-out infinite alternate;
    pointer-events:none;
    z-index:0;
  }
  @keyframes bgPulse {
    from { transform: scale(1) rotate(0deg); }
    to   { transform: scale(1.05) rotate(2deg); }
  }

  /* HEADER */
  header {
    position: relative; z-index:10;
    display: flex; align-items:center; justify-content:space-between;
    padding: 1.5rem 3rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,26,0.8);
    backdrop-filter: blur(20px);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem; font-weight:800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color:transparent;
    letter-spacing:-0.5px;
  }
  .logo span { color: var(--accent3); -webkit-text-fill-color: var(--accent3); }
  .header-stats {
    display:flex; gap:2rem;
  }
  .hstat {
    text-align:center;
  }
  .hstat-val {
    font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700;
    color: var(--accent);
  }
  .hstat-label { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

  /* MAIN LAYOUT */
  main {
    position:relative; z-index:1;
    max-width: 1400px; margin:0 auto;
    padding: 2.5rem 2rem;
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 2rem;
  }

  .section-title {
    font-family:'Syne',sans-serif;
    font-size:0.75rem; font-weight:700;
    text-transform:uppercase; letter-spacing:3px;
    color: var(--accent); margin-bottom:1.5rem;
    display:flex; align-items:center; gap:0.5rem;
  }
  .section-title::after {
    content:''; flex:1; height:1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  /* FORM */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    animation: fadeUp 0.6s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .field {
    display:flex; flex-direction:column; gap:0.4rem;
  }
  .field.full { grid-column: 1/-1; }

  label {
    font-size:0.72rem; font-weight:500;
    text-transform:uppercase; letter-spacing:1px;
    color: var(--muted);
  }

  input, select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width:100%;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
  }
  select option { background: var(--surface); }

  /* Model selector */
  .model-selector {
    display:flex; gap:0.5rem;
    background: var(--surface);
    border-radius:12px; padding:4px;
    border: 1px solid var(--border);
  }
  .model-btn {
    flex:1; padding:0.5rem;
    border:none; border-radius:9px;
    font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:500;
    cursor:pointer; transition:all 0.2s;
    background:transparent; color:var(--muted);
  }
  .model-btn.active {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color:#fff;
  }

  /* Predict button */
  .predict-btn {
    width:100%; padding:1rem;
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
    border:none; border-radius:12px;
    color:#fff; font-family:'Syne',sans-serif;
    font-size:1rem; font-weight:700;
    letter-spacing:1px; cursor:pointer;
    margin-top:1.5rem;
    position:relative; overflow:hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .predict-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,212,255,0.3);
  }
  .predict-btn:active { transform:translateY(0); }
  .predict-btn::after {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  }
  .predict-btn.loading { pointer-events:none; opacity:0.7; }

  /* RESULT PANEL */
  .result-panel {
    display:flex; flex-direction:column; gap:1.5rem;
  }

  /* Result card */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    animation: fadeUp 0.6s 0.1s ease both;
    min-height: 260px;
    display:flex; flex-direction:column; justify-content:center;
    align-items:center; text-align:center;
    position:relative; overflow:hidden;
  }
  .result-card.has-result { align-items:flex-start; text-align:left; }

  .idle-state {
    display:flex; flex-direction:column; align-items:center; gap:1rem;
  }
  .idle-icon {
    width:70px; height:70px; border-radius:50%;
    background: var(--surface);
    display:flex; align-items:center; justify-content:center;
    font-size:2rem;
    border: 1px solid var(--border);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-8px); }
  }
  .idle-text { color:var(--muted); font-size:0.9rem; }

  .result-badge {
    display:inline-flex; align-items:center; gap:0.5rem;
    padding:0.4rem 1rem; border-radius:100px;
    font-size:0.78rem; font-weight:600; letter-spacing:1px;
    text-transform:uppercase; margin-bottom:1rem;
  }
  .badge-danger { background:rgba(239,68,68,0.15); color:var(--danger); border:1px solid rgba(239,68,68,0.3); }
  .badge-success { background:rgba(16,185,129,0.15); color:var(--success); border:1px solid rgba(16,185,129,0.3); }
  .badge-warning { background:rgba(245,158,11,0.15); color:var(--warning); border:1px solid rgba(245,158,11,0.3); }

  .result-label {
    font-family:'Syne',sans-serif;
    font-size:1.8rem; font-weight:800;
    margin-bottom:0.5rem;
    line-height:1.1;
  }
  .result-sub { color:var(--muted); font-size:0.85rem; }

  /* Probability bar */
  .prob-section { width:100%; margin-top:1.5rem; }
  .prob-header { display:flex; justify-content:space-between; margin-bottom:0.5rem; }
  .prob-label { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .prob-val { font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; }
  .prob-bar-bg {
    height:8px; border-radius:100px;
    background: var(--surface);
    overflow:hidden;
  }
  .prob-bar-fill {
    height:100%; border-radius:100px;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    width:0%;
  }
  .fill-danger { background:linear-gradient(to right, var(--accent2), var(--danger)); }
  .fill-warning { background:linear-gradient(to right, var(--accent), var(--warning)); }
  .fill-success { background:linear-gradient(to right, var(--accent), var(--success)); }

  /* Stats cards row */
  .mini-stats {
    display:grid; grid-template-columns:1fr 1fr; gap:1rem;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  .mini-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:1.2rem;
  }
  .mini-card-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:0.3rem; }
  .mini-card-val { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800; }

  /* Model accuracy card */
  .accuracy-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:20px; padding:1.5rem;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .acc-bars { display:flex; flex-direction:column; gap:0.8rem; margin-top:1rem; }
  .acc-row { display:flex; align-items:center; gap:0.8rem; }
  .acc-name { font-size:0.78rem; color:var(--muted); width:130px; flex-shrink:0; }
  .acc-bar-bg { flex:1; height:6px; border-radius:100px; background:var(--surface); overflow:hidden; }
  .acc-bar-fill { height:100%; border-radius:100px; background:linear-gradient(to right,var(--accent2),var(--accent)); }
  .acc-pct { font-size:0.78rem; font-weight:600; color:var(--accent); width:38px; text-align:right; }

  /* Toast */
  .toast {
    position:fixed; bottom:2rem; right:2rem;
    background:var(--danger); color:#fff;
    padding:0.8rem 1.5rem; border-radius:12px;
    font-size:0.85rem; z-index:1000;
    transform:translateX(200%); transition:transform 0.3s;
    max-width:300px;
  }
  .toast.show { transform:translateX(0); }

  /* Spinner */
  @keyframes spin { to { transform:rotate(360deg); } }
  .spinner {
    display:inline-block; width:16px; height:16px;
    border:2px solid rgba(255,255,255,0.3);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin 0.7s linear infinite;
    vertical-align:middle; margin-right:6px;
  }

  /* Responsive */
  @media(max-width:900px){
    main { grid-template-columns:1fr; }
    header { padding:1rem 1.5rem; }
    .header-stats { display:none; }
  }
  @media(max-width:500px){
    .form-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Churn<span>Sense</span></div>
  <div class="header-stats" id="headerStats">
    <div class="hstat">
      <div class="hstat-val" id="statRF">—</div>
      <div class="hstat-label">Random Forest</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="statGB">—</div>
      <div class="hstat-label">Gradient Boost</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="statLR">—</div>
      <div class="hstat-label">Logistic Reg.</div>
    </div>
  </div>
</header>

<main>
  <!-- LEFT: FORM -->
  <div>
    <div class="section-title">📋 Customer Profile</div>
    <div class="form-card">

      <!-- Model selection -->
      <div style="margin-bottom:1.5rem;">
        <label style="display:block;margin-bottom:0.5rem;">Select AI Model</label>
        <div class="model-selector">
          <button class="model-btn active" onclick="selectModel('Random Forest',this)">🌲 Random Forest</button>
          <button class="model-btn" onclick="selectModel('Gradient Boosting',this)">⚡ Gradient Boost</button>
          <button class="model-btn" onclick="selectModel('Logistic Regression',this)">📈 Logistic Reg.</button>
        </div>
      </div>

      <div class="form-grid">
        <div class="field">
          <label>Tenure (months)</label>
          <input type="number" id="tenure" min="0" max="72" value="12" placeholder="0-72"/>
        </div>
        <div class="field">
          <label>Monthly Charges ($)</label>
          <input type="number" id="monthlyCharges" step="0.01" value="65.50" placeholder="18-119"/>
        </div>
        <div class="field">
          <label>Total Charges ($)</label>
          <input type="number" id="totalCharges" step="0.01" value="786.00" placeholder="18-8684"/>
        </div>
        <div class="field">
          <label>Senior Citizen</label>
          <select id="seniorCitizen">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div class="field">
          <label>Gender</label>
          <select id="gender">
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>
        <div class="field">
          <label>Partner</label>
          <select id="partner">
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>
        <div class="field">
          <label>Dependents</label>
          <select id="dependents">
            <option>No</option>
            <option>Yes</option>
          </select>
        </div>
        <div class="field">
          <label>Phone Service</label>
          <select id="phoneService">
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>
        <div class="field">
          <label>Multiple Lines</label>
          <select id="multipleLines">
            <option>No</option>
            <option>Yes</option>
            <option>No phone service</option>
          </select>
        </div>
        <div class="field">
          <label>Internet Service</label>
          <select id="internetService">
            <option>Fiber optic</option>
            <option>DSL</option>
            <option>No</option>
          </select>
        </div>
        <div class="field">
          <label>Online Security</label>
          <select id="onlineSecurity">
            <option>No</option>
            <option>Yes</option>
            <option>No internet service</option>
          </select>
        </div>
        <div class="field">
          <label>Tech Support</label>
          <select id="techSupport">
            <option>No</option>
            <option>Yes</option>
            <option>No internet service</option>
          </select>
        </div>
        <div class="field full">
          <label>Contract Type</label>
          <select id="contract">
            <option>Month-to-month</option>
            <option>One year</option>
            <option>Two year</option>
          </select>
        </div>
        <div class="field">
          <label>Paperless Billing</label>
          <select id="paperlessBilling">
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>
        <div class="field">
          <label>Payment Method</label>
          <select id="paymentMethod">
            <option>Electronic check</option>
            <option>Mailed check</option>
            <option>Bank transfer (automatic)</option>
            <option>Credit card (automatic)</option>
          </select>
        </div>
      </div>

      <button class="predict-btn" id="predictBtn" onclick="predict()">
        🔍 ANALYZE CHURN RISK
      </button>
    </div>
  </div>

  <!-- RIGHT: RESULTS -->
  <div class="result-panel">
    <div class="section-title">📊 Prediction Result</div>

    <!-- Main result -->
    <div class="result-card" id="resultCard">
      <div class="idle-state" id="idleState">
        <div class="idle-icon">🔮</div>
        <div class="idle-text">Fill in the customer profile<br/>and click Analyze</div>
      </div>
      <div id="resultContent" style="display:none; width:100%;">
        <div id="resultBadge" class="result-badge"></div>
        <div id="resultLabel" class="result-label"></div>
        <div id="resultSub" class="result-sub"></div>
        <div class="prob-section">
          <div class="prob-header">
            <span class="prob-label">Churn Probability</span>
            <span class="prob-val" id="probVal"></span>
          </div>
          <div class="prob-bar-bg">
            <div class="prob-bar-fill" id="probBar"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Mini stats -->
    <div class="mini-stats">
      <div class="mini-card">
        <div class="mini-card-label">Model Used</div>
        <div class="mini-card-val" id="modelUsed" style="font-size:1rem; margin-top:0.2rem; color:var(--accent);">—</div>
      </div>
      <div class="mini-card">
        <div class="mini-card-label">Model Accuracy</div>
        <div class="mini-card-val" id="modelAccuracy" style="color:var(--success);">—</div>
      </div>
    </div>

    <!-- Model accuracy comparison -->
    <div class="accuracy-card">
      <div class="section-title" style="margin-bottom:0.5rem;">🎯 Model Accuracies</div>
      <div class="acc-bars" id="accBars">
        <div class="acc-row">
          <span class="acc-name">Random Forest</span>
          <div class="acc-bar-bg"><div class="acc-bar-fill" id="accRF" style="width:0%"></div></div>
          <span class="acc-pct" id="pctRF">—</span>
        </div>
        <div class="acc-row">
          <span class="acc-name">Gradient Boosting</span>
          <div class="acc-bar-bg"><div class="acc-bar-fill" id="accGB" style="width:0%"></div></div>
          <span class="acc-pct" id="pctGB">—</span>
        </div>
        <div class="acc-row">
          <span class="acc-name">Logistic Regression</span>
          <div class="acc-bar-bg"><div class="acc-bar-fill" id="accLR" style="width:0%"></div></div>
          <span class="acc-pct" id="pctLR">—</span>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://maryam-cheema-ai-customer-churn-prediction.hf.space';
  let selectedModel = 'Random Forest';

  function selectModel(name, btn) {
    selectedModel = name;
    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }

  async function loadAccuracies() {
    try {
      const r = await fetch(`${API}/accuracies`);
      const data = await r.json();
      const rf = (data['Random Forest']*100).toFixed(1);
      const gb = (data['Gradient Boosting']*100).toFixed(1);
      const lr = (data['Logistic Regression']*100).toFixed(1);

      document.getElementById('statRF').textContent = rf + '%';
      document.getElementById('statGB').textContent = gb + '%';
      document.getElementById('statLR').textContent = lr + '%';

      setTimeout(() => {
        document.getElementById('accRF').style.width = rf + '%';
        document.getElementById('accGB').style.width = gb + '%';
        document.getElementById('accLR').style.width = lr + '%';
      }, 300);
      document.getElementById('pctRF').textContent = rf + '%';
      document.getElementById('pctGB').textContent = gb + '%';
      document.getElementById('pctLR').textContent = lr + '%';
    } catch(e) {
      // API not connected yet — just show placeholder
    }
  }

  async function predict() {
    const btn = document.getElementById('predictBtn');
    btn.innerHTML = '<span class="spinner"></span> ANALYZING...';
    btn.classList.add('loading');

    const payload = {
      tenure: parseInt(document.getElementById('tenure').value),
      MonthlyCharges: parseFloat(document.getElementById('monthlyCharges').value),
      TotalCharges: parseFloat(document.getElementById('totalCharges').value),
      gender: document.getElementById('gender').value,
      SeniorCitizen: parseInt(document.getElementById('seniorCitizen').value),
      Partner: document.getElementById('partner').value,
      Dependents: document.getElementById('dependents').value,
      PhoneService: document.getElementById('phoneService').value,
      MultipleLines: document.getElementById('multipleLines').value,
      InternetService: document.getElementById('internetService').value,
      OnlineSecurity: document.getElementById('onlineSecurity').value,
      TechSupport: document.getElementById('techSupport').value,
      Contract: document.getElementById('contract').value,
      PaperlessBilling: document.getElementById('paperlessBilling').value,
      PaymentMethod: document.getElementById('paymentMethod').value,
      model: selectedModel
    };

    try {
      const res = await fetch(`${API}/predict`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      if(!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'API Error');
      }
      const data = await res.json();
      showResult(data);
    } catch(e) {
      showToast('❌ ' + e.message);
    } finally {
      btn.innerHTML = '🔍 ANALYZE CHURN RISK';
      btn.classList.remove('loading');
    }
  }

  function showResult(data) {
    document.getElementById('idleState').style.display = 'none';
    const rc = document.getElementById('resultContent');
    rc.style.display = 'block';

    const badge = document.getElementById('resultBadge');
    const label = document.getElementById('resultLabel');
    const sub   = document.getElementById('resultSub');
    const bar   = document.getElementById('probBar');
    const probV = document.getElementById('probVal');

    const prob = data.churn_probability;
    probV.textContent = prob.toFixed(1) + '%';

    bar.style.width = '0%';
    bar.className = 'prob-bar-fill';

    if(data.risk_level === 'High Risk') {
      badge.className = 'result-badge badge-danger';
      badge.innerHTML = '🔴 ' + data.risk_level;
      label.textContent = 'Likely to Churn';
      label.style.color = 'var(--danger)';
      sub.textContent = 'This customer shows strong churn signals. Immediate retention action recommended.';
      bar.classList.add('fill-danger');
    } else if(data.risk_level === 'Medium Risk') {
      badge.className = 'result-badge badge-warning';
      badge.innerHTML = '🟡 ' + data.risk_level;
      label.textContent = 'At-Risk Customer';
      label.style.color = 'var(--warning)';
      sub.textContent = 'Moderate risk detected. Consider proactive engagement to retain this customer.';
      bar.classList.add('fill-warning');
    } else {
      badge.className = 'result-badge badge-success';
      badge.innerHTML = '🟢 ' + data.risk_level;
      label.textContent = 'Likely to Stay';
      label.style.color = 'var(--success)';
      sub.textContent = 'This customer has low churn probability. Continue providing excellent service.';
      bar.classList.add('fill-success');
    }

    setTimeout(() => { bar.style.width = prob + '%'; }, 100);

    document.getElementById('modelUsed').textContent = data.model_used;
    document.getElementById('modelAccuracy').textContent = data.model_accuracy + '%';
  }

  loadAccuracies();
</script>
</body>
</html>
